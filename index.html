<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepEdit 数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }

        .header h1 {
            color: #1e40af;
            font-size: 32px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        /* 数据表格样式 */
        .data-table-section {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .data-table-section h2 {
            color: #1e293b;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .data-table thead {
            background: #f8fafc;
        }

        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            border-bottom: 2px solid #e2e8f0;
        }

        .data-table td {
            padding: 14px 16px;
            font-size: 14px;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
        }

        .data-table tbody tr:hover {
            background: #f8fafc;
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table .highlight-cell {
            font-weight: 600;
            color: #3b82f6;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            font-size: 14px;
        }

        .metrics-grid {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .metric-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 1;
            min-width: 180px;
            display: flex;
            flex-direction: column;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .metric-card.highlight {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
        }

        .metric-card.highlight .metric-label {
            color: rgba(255,255,255,0.9);
        }

        .metric-card.highlight .metric-value {
            color: white;
        }

        .metric-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 500;
            white-space: nowrap;
        }

        .metric-value {
            font-size: 28px;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .metric-change {
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
            align-self: flex-start;
        }

        .metric-change.positive {
            background: #dcfce7;
            color: #16a34a;
        }

        .metric-change.negative {
            background: #fee2e2;
            color: #dc2626;
        }

        .metric-change.neutral {
            background: #f1f5f9;
            color: #64748b;
        }

        /* AI分析看板样式 */
        .analysis-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .analysis-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .analysis-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-badge {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .analysis-content {
            background: #f8fafc;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            line-height: 1.8;
        }

        .analysis-content h3 {
            color: #1e293b;
            font-size: 16px;
            margin: 20px 0 12px 0;
            font-weight: 600;
        }

        .analysis-content h3:first-child {
            margin-top: 0;
        }

        .analysis-content p {
            color: #475569;
            margin-bottom: 12px;
        }

        .analysis-placeholder {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
        }

        .analysis-placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .chart-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .chart-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
        }

        .time-filters {
            display: flex;
            gap: 8px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 8px;
        }

        .time-filter {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .time-filter.active {
            background: #3b82f6;
            color: white;
        }

        .time-filter:hover:not(.active) {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .input-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .input-section h2 {
            color: #1e293b;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }

        .input-group input {
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .submit-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .data-info {
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #64748b;
        }

        .data-info strong {
            color: #1e293b;
        }

        @media (max-width: 768px) {
            .metrics-grid {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .metric-card {
                min-width: 160px;
            }

            .metric-value {
                font-size: 24px;
            }
            
            .input-grid {
                grid-template-columns: 1fr;
            }

            .data-table {
                font-size: 12px;
            }

            .data-table th,
            .data-table td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <div class="logo">D</div>
                DeepEdit 数据看板
            </h1>
            <div class="subtitle">论文润色服务 · 市场数据实时监控</div>
        </div>

        <div class="data-info">
            <strong>📊 数据统计：</strong>已加载 <span id="dataCount">0</span> 条历史记录 | 时间范围：<span id="dateRange">加载中...</span>
        </div>

        <!-- 昨日数据表格 -->
        <div class="data-table-section">
            <h2>📅 昨日数据</h2>
            <div id="yesterdayTable"></div>
        </div>

        <!-- 本周数据表格 -->
        <div class="data-table-section">
            <h2>📊 本周数据明细（最近7天）</h2>
            <div id="weeklyTable"></div>
        </div>

        <div id="metricsContainer" class="metrics-grid"></div>

        <!-- AI数据分析看板 -->
        <div class="analysis-section">
            <div class="analysis-header">
                <div class="analysis-title">
                    🤖 AI 数据分析
                    <span class="ai-badge">Powered by Claude</span>
                </div>
                <button class="analyze-btn" id="analyzeBtn">
                    <span id="analyzeText">生成分析报告</span>
                </button>
            </div>
            <div class="analysis-content" id="analysisContent">
                <div class="analysis-placeholder">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <div>点击"生成分析报告"按钮，AI将为您分析今日和本周的数据表现</div>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">数据趋势分析</div>
                <div class="time-filters">
                    <button class="time-filter active" onclick="window.changeTimeRange('7d')">近7天</button>
                    <button class="time-filter" onclick="window.changeTimeRange('30d')">近30天</button>
                    <button class="time-filter" onclick="window.changeTimeRange('all')">全部</button>
                </div>
            </div>
            <canvas id="trendChart"></canvas>
        </div>

        <div class="input-section">
            <h2>📝 录入今日数据</h2>
            <form id="dataForm">
                <div class="input-grid">
                    <div class="input-group">
                        <label>日期 *</label>
                        <input type="date" name="date" required>
                    </div>
                    <div class="input-group">
                        <label>网站访问次数</label>
                        <input type="number" name="visits" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>网站访问人数(UV)</label>
                        <input type="number" name="uv" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>老访客数</label>
                        <input type="number" name="oldVisitors" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>网站注册数</label>
                        <input type="number" name="registrations" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>下单数量 *</label>
                        <input type="number" name="conversions" placeholder="0" required>
                    </div>
                    <div class="input-group">
                        <label>上传数量</label>
                        <input type="number" name="uploads" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>润色数量</label>
                        <input type="number" name="polished" placeholder="0">
                    </div>
                </div>
                <button type="submit" class="submit-btn">✓ 提交数据</button>
            </form>
        </div>
    </div>

        let allData = [];

        async function init() {
            loadHistoricalData();
            await loadStoredData();
            updateDataInfo();
            renderYesterdayTable();
            renderWeeklyTable();
            renderMetrics();
            renderChart();
            document.querySelector('input[name="date"]').valueAsDate = new Date();
            document.getElementById('analyzeBtn').addEventListener('click', generateAnalysis);
        }

        function loadHistoricalData() {
            allData = HISTORICAL_DATA;
            console.log(`✓ 已加载 ${allData.length} 条历史数据`);
        }

        async function loadStoredData() {
            try {
                const keys = await window.storage.list('deepedit:', true);
                if (keys && keys.keys) {
                    for (const key of keys.keys) {
                        const result = await window.storage.get(key, true);
                        if (result && result.value) {
                            const data = JSON.parse(result.value);
                            const existingIndex = allData.findIndex(d => d.date === data.date);
                            if (existingIndex >= 0) {
                                allData[existingIndex] = data;
                            } else {
                                allData.push(data);
                            }
                        }
                    }
                }
            } catch (error) {
                console.log('加载存储数据:', error.message);
            }
            allData.sort((a, b) => new Date(a.date) - new Date(b.date));
        }

        function updateDataInfo() {
            document.getElementById('dataCount').textContent = allData.length;
            if (allData.length > 0) {
                const firstDate = allData[0].date;
                const lastDate = allData[allData.length - 1].date;
                document.getElementById('dateRange').textContent = `${firstDate} 至 ${lastDate}`;
            }
        }

        // 渲染昨日数据表格
        function renderYesterdayTable() {
            const container = document.getElementById('yesterdayTable');
            const now = new Date();
            const yesterday = new Date(now);
            yesterday.setDate(now.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            
            const yesterdayData = allData.find(d => d.date === yesterdayStr);
            
            if (!yesterdayData) {
                container.innerHTML = '<div class="no-data">暂无昨日数据</div>';
                return;

            container.innerHTML = `

        // 渲染本周数据表格
        function renderWeeklyTable() {
            const container = document.getElementById('weeklyTable');
            const now = new Date();
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - 6);
            
            const weekData = allData.filter(d => new Date(d.date) >= weekStart).reverse();
            
            if (weekData.length === 0) {
                container.innerHTML = '<div class="no-data">暂无本周数据</div>';
                return;
            }
            
            const rows = weekData.map(d => `
                <tr>
                    <td><strong>${d.date}</strong></td>
                    <td>${d.visits}</td>
                    <td>${d.uv}</td>
                    <td>${d.oldVisitors}</td>
                    <td>${d.registrations}</td>
                    <td class="highlight-cell">${d.conversions}</td>
                    <td>${d.uploads}</td>
                    <td>${d.polished}</td>
                </tr>
            `).join('');
            
            // 计算汇总
            const total = {
                visits: weekData.reduce((sum, d) => sum + d.visits, 0),
                uv: weekData.reduce((sum, d) => sum + d.uv, 0),
                oldVisitors: weekData.reduce((sum, d) => sum + d.oldVisitors, 0),
                registrations: weekData.reduce((sum, d) => sum + d.registrations, 0),
                conversions: weekData.reduce((sum, d) => sum + d.conversions, 0),
                uploads: weekData.reduce((sum, d) => sum + d.uploads, 0),
                polished: weekData.reduce((sum, d) => sum + d.polished, 0)
            };
            
            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>访问次数</th>

        function calculateWeeklyChange() {
            const now = new Date();
            const thisWeekStart = new Date(now);
            thisWeekStart.setDate(now.getDate() - 6);
            const thisWeekData = allData.filter(d => new Date(d.date) >= thisWeekStart);
            
            const lastWeekStart = new Date(now);
            lastWeekStart.setDate(now.getDate() - 13);
            const lastWeekEnd = new Date(now);
            lastWeekEnd.setDate(now.getDate() - 7);
            const lastWeekData = allData.filter(d => {
                const date = new Date(d.date);
                return date >= lastWeekStart && date < lastWeekEnd;
            });
            
            const thisWeekSum = {
                visits: thisWeekData.reduce((sum, d) => sum + d.visits, 0),
                uv: thisWeekData.reduce((sum, d) => sum + d.uv, 0),
                conversions: thisWeekData.reduce((sum, d) => sum + d.conversions, 0),
                registrations: thisWeekData.reduce((sum, d) => sum + d.registrations, 0),
                uploads: thisWeekData.reduce((sum, d) => sum + d.uploads, 0)
            };
            
            const lastWeekSum = {
                visits: lastWeekData.reduce((sum, d) => sum + d.visits, 0),
                uv: lastWeekData.reduce((sum, d) => sum + d.uv, 0),
                conversions: lastWeekData.reduce((sum, d) => sum + d.conversions, 0),
                registrations: lastWeekData.reduce((sum, d) => sum + d.registrations, 0),
                uploads: lastWeekData.reduce((sum, d) => sum + d.uploads, 0)
            };
            
            return {
                thisWeek: thisWeekSum,
                lastWeek: lastWeekSum,
                changes: {
                    visits: lastWeekSum.visits > 0 ? ((thisWeekSum.visits - lastWeekSum.visits) / lastWeekSum.visits * 100) : 0,
                    uv: lastWeekSum.uv > 0 ? ((thisWeekSum.uv - lastWeekSum.uv) / lastWeekSum.uv * 100) : 0,
                    conversions: lastWeekSum.conversions > 0 ? ((thisWeekSum.conversions - lastWeekSum.conversions) / lastWeekSum.conversions * 100) : 0,
                    registrations: lastWeekSum.registrations > 0 ? ((thisWeekSum.registrations - lastWeekSum.registrations) / lastWeekSum.registrations * 100) : 0,
                    uploads: lastWeekSum.uploads > 0 ? ((thisWeekSum.uploads - lastWeekSum.uploads) / lastWeekSum.uploads * 100) : 0
                }
            };
        }

                },
                {
                    label: '本周访问人数(UV)',
                    value: weeklyData.thisWeek.uv,
                    change: weeklyData.changes.uv,
                    suffix: '人'
                },
                {
                    label: '本周注册数',
                    value: weeklyData.thisWeek.registrations,
                    change: weeklyData.changes.registrations,
                    suffix: '人'
                },
                {
                    label: '本周上传数量',
                    value: weeklyData.thisWeek.uploads,
                    change: weeklyData.changes.uploads,
                    suffix: '个'
                }
            ];
            
            container.innerHTML = metrics.map(metric => {
                const changeValue = Math.abs(metric.change).toFixed(1);
                let changeClass = 'neutral';
                let changeSymbol = '';
                
                if (metric.change > 0) {
                    changeClass = 'positive';
                    changeSymbol = '↑';
                } else if (metric.change < 0) {
                    changeClass = 'negative';
                    changeSymbol = '↓';
                }
                
                return `
                    <div class="metric-card ${metric.highlight ? 'highlight' : ''}">
                        <div class="metric-label">${metric.label}</div>
                        <div class="metric-value">${metric.value}${metric.suffix}</div>
                        <div class="metric-change ${changeClass}">
                            ${changeSymbol} ${changeValue}% 周环比
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            let filteredData = [...allData];
            const now = new Date();
            
            if (currentTimeRange === '7d') {
                const weekAgo = new Date(now);
                weekAgo.setDate(now.getDate() - 6);
                filteredData = allData.filter(d => new Date(d.date) >= weekAgo);
            } else if (currentTimeRange === '30d') {
                const monthAgo = new Date(now);
                monthAgo.setDate(now.getDate() - 29);
                filteredData = allData.filter(d => new Date(d.date) >= monthAgo);
            }
            
            if (currentChart) {
                currentChart.destroy();
            }
            
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filteredData.map(d => d.date),
                    datasets: [
                        {
                            label: '下单数量',
                            data: filteredData.map(d => d.conversions),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true,
                            pointRadius: 4,
                            pointHoverRadius: 6
                        },
                        {
                            label: '访问人数(UV)',
                            data: filteredData.map(d => d.uv),
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        },
                        {
                            label: '注册数',
                            data: filteredData.map(d => d.registrations),
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        },
                        {
                            label: '上传数量',
                            data: filteredData.map(d => d.uploads),
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            pointRadius: 3,
                            pointHoverRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2.5,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 15,
                                font: { size: 13 }
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f1f5f9' },
                            ticks: { font: { size: 12 } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { size: 11 },
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    }
                }
            });
        }

        window.changeTimeRange = function(range) {
            currentTimeRange = range;
            document.querySelectorAll('.time-filter').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderChart();
        }

        async function generateAnalysis() {
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('analyzeText');
            const content = document.getElementById('analysisContent');
            
            btn.disabled = true;
            btnText.innerHTML = '<div class="loading-spinner"></div> 分析中...';
            
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const todayData = allData.find(d => d.date === today);
            const weeklyData = calculateWeeklyChange();
            
            const prompt = `你是DeepEdit论文润色服务的数据分析师。请分析以下数据并给出专业的分析报告。

【今日数据】（${today}）
${todayData ? `- 访问次数: ${todayData.visits}
- 访问人数(UV): ${todayData.uv}
- 老访客数: ${todayData.oldVisitors}
- 注册数: ${todayData.registrations}
- 下单数量: ${todayData.conversions}
- 上传数量: ${todayData.uploads}
- 润色数量: ${todayData.polished}` : '今日暂无数据'}

【本周数据汇总】（最近7天）
- 总访问次数: ${weeklyData.thisWeek.visits}
- 总访问人数(UV): ${weeklyData.thisWeek.uv}
- 总注册数: ${weeklyData.thisWeek.registrations}
- 总下单数量: ${weeklyData.thisWeek.conversions}
- 总上传数量: ${weeklyData.thisWeek.uploads}

【周环比变化】
- 访问次数: ${weeklyData.changes.visits > 0 ? '+' : ''}${weeklyData.changes.visits.toFixed(1)}%
- 访问人数(UV): ${weeklyData.changes.uv > 0 ? '+' : ''}${weeklyData.changes.uv.toFixed(1)}%
- 下单数量: ${weeklyData.changes.conversions > 0 ? '+' : ''}${weeklyData.changes.conversions.toFixed(1)}%
- 注册数: ${weeklyData.changes.registrations > 0 ? '+' : ''}${weeklyData.changes.registrations.toFixed(1)}%

请提供简洁的分析报告，包括：
1. 今日表现总结（如果有今日数据）
2. 本周核心数据分析
3. 关键发现和趋势
4. 优化建议（2-3条具体可行的建议）

请用专业但易懂的语言，直接给出分析内容，不要有开场白。用简洁的段落形式输出，不要使用markdown格式。`;

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 2000,
                        messages: [
                            { role: "user", content: prompt }
                        ]
                    })
                });

                const data = await response.json();
                const analysisText = data.content[0].text;
                
                const lines = analysisText.split('\n\n');
                let htmlContent = '';
                lines.forEach(line => {
                    if (line.trim()) {
                        htmlContent += '<p>' + line + '</p>';
                    }
                });
                
                content.innerHTML = htmlContent;
                btnText.textContent = '重新生成分析';
                
            } catch (error) {
                content.innerHTML = `<p style="color: #dc2626;">生成分析失败: ${error.message}</p>`;
                btnText.textContent = '重试';
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('dataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                date: formData.get('date'),
                visits: parseInt(formData.get('visits')) || 0,
                uv: parseInt(formData.get('uv')) || 0,
                oldVisitors: parseInt(formData.get('oldVisitors')) || 0,
                registrations: parseInt(formData.get('registrations')) || 0,
                conversions: parseInt(formData.get('conversions')) || 0,
                uploads: parseInt(formData.get('uploads')) || 0,
                polished: parseInt(formData.get('polished')) || 0
            };
            
            try {
                const key = `deepedit:${data.date}`;
                await window.storage.set(key, JSON.stringify(data), true);
                
                const existingIndex = allData.findIndex(d => d.date === data.date);
                if (existingIndex >= 0) {
                    allData[existingIndex] = data;
                } else {
                    allData.push(data);
                }
                allData.sort((a, b) => new Date(a.date) - new Date(b.date));
                
                updateDataInfo();
                renderYesterdayTable();
                renderWeeklyTable();
                renderMetrics();
                renderChart();
                
                alert('✓ 数据已保存！所有用户都能看到更新。');
                e.target.reset();
                document.querySelector('input[name="date"]').valueAsDate = new Date();
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        });

        init();
    </script>
</body>
</html>
